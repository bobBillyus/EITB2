<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EITB2</title>

    <script src="https://kit.fontawesome.com/4089449204.js" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cascadia-mono/index.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper sidebar_open">
        <div class="main">
            <h1>EITB2</h1>
            <p>ahhhhhh</p>
            {% if final_query %}
                <p>Showing results for: {{ final_query }}</p>
            {% endif %}
        </div>
    <!-- Search bar -->
        <form action="/" method="POST">
            <div class="search_box">
                <div class="row">
                    <input type="text" name="searchbar" id="searchbar" placeholder="Search Wikipedia...">
                    <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
<!-- Suggestions -->
                <div class="suggestions">
                    Suggestions will appear here
                </div>
            </div>
        </form>

        <!-- Sidebar toggle button -->
        <button class="sidebar_toggle" type="button" onclick="togglesidebar()">
            <span class="material-icons sb-icon-open">keyboard_double_arrow_left</span>
            <span class="material-icons sb-icon-close">keyboard_double_arrow_right</span>
        </button>
        
        <!-- Sidebar -->
        <div class="sidebar">
            What is this?
        </div>
    </div>

</body>
</html>
