<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EITB2</title>

    <script src="https://kit.fontawesome.com/4089449204.js" crossorigin="anonymous"></script>
    <script>
        function togglesidebar() {
            const wrapper = document.querySelector(".wrapper");   
            if (wrapper) {
                wrapper.classList.toggle("sidebar_open");
            } else {
                console.error("Error: Could not find the .wrapper element");
            }
            }
    </script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper sidebar_open">
        <div class="main">
            <h1>EITB2</h1>
            <p>ahhhhhh</p>
            </div>
            <!-- Search bar -->
            <form action="/" method="POST"> <div class="search_box">
                    <div class="row">
                        <input type="text" name="wiki_page" id="input_box" placeholder="Search Wikipedia...">
                        <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                    <div class="suggestions">
                        <ul>
                            <li>suggestion 1</li>
                            <li>suggestion 2</li>
                        </ul>
                    </div>
                </div>
            </form>

        <!-- Sidebar toggle button -->
        <button class="sidebar_toggle" type="button" onclick="togglesidebar()">
            <span class="material-icons sb-icon-open">keyboard_double_arrow_left</span>
            <span class="material-icons sb-icon-close">keyboard_double_arrow_right</span>
        </button>
        
        <!-- Sidebar -->
        <div class="sidebar">
            Sidebar content
        </div>
    </div>

</body>
</html>
