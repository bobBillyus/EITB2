<script>
    document.addEventListener('DOMContentLoaded', () => {
        const inputBox = document.getElementById('input_box');
        const suggestionBox = document.querySelector('.suggestions');
        
        let abortController = null;
        let lastQuery = ""; // Prevent redundant API calls

        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        const performSearch = async () => {
            let query = inputBox.value.trim();

            // Optimization: Don't search if the query hasn't actually changed
            if (query === lastQuery) return;
            lastQuery = query;

            if (abortController) abortController.abort();

            if (query.length > 2) {
                abortController = new AbortController();
                
                try {
                    const response = await fetch('/live-search', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ query: query }),
                        signal: abortController.signal
                    });

                    const results = await response.json();
                    displayResults(results);
                } catch (error) {
                    if (error.name !== 'AbortError') console.error('Search error:', error);
                }
            } else {
                suggestionBox.innerHTML = "Suggestions will appear here";
            }
        };

        inputBox.onkeyup = debounce(performSearch, 250); // Dropped to 250ms for slightly faster feel

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!inputBox.contains(e.target) && !suggestionBox.contains(e.target)) {
                suggestionBox.style.display = 'none';
            }
        });

        inputBox.onfocus = () => suggestionBox.style.display = 'block';

        function displayResults(results) {
            suggestionBox.style.display = 'block';
            if (!results || !results.length) {
                suggestionBox.innerHTML = "<ul><li>No results found</li></ul>";
                return;
            }

            const htmlRows = results.map((item) => {
                return `<li><a href="/graph/?page=${encodeURIComponent(item)}">${item}</a></li>`;
            });
            suggestionBox.innerHTML = `<ul>${htmlRows.join('')}</ul>`;
        }
    });

    function togglesidebar() {
        const wrapper = document.querySelector(".wrapper");   
        if (wrapper) {
            wrapper.classList.toggle("sidebar_open");
        }
    }
</script>
