<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EITB2</title>

    <script src="https://kit.fontawesome.com/4089449204.js" crossorigin="anonymous"></script>
    <script>
        // We wait for the page to load, then find our elements
        document.addEventListener('DOMContentLoaded', () => {
            const inputBox = document.getElementById('input_box');
            const suggestionBox = document.querySelector('.suggestions');

            inputBox.onkeyup = async function() {
                let query = inputBox.value;

                // Only search if the user typed more than 2 letters
                if (query.length > 2) {
                    const response = await fetch('/live-search', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ query: query })
                    });

                    const results = await response.json();
                    displayResults(results);
                } else {
                    // Clear suggestions if the input is too short
                    suggestionBox.innerHTML = "";
                }
            };

            function displayResults(results) {
                if (!results.length) {
                    suggestionBox.innerHTML = "";
                    return;
                }

                // Build the list items based on what Flask/Wikipedia sent back
                const htmlRows = results.map((item) => {
                    return `<li><a href="/graph/?page=${encodeURIComponent(item)}">${item}</a></li>`;
                });

                // Inject the <ul> into your suggestions div
                suggestionBox.innerHTML = `<ul>${htmlRows.join('')}</ul>`;
            }
        });

        function togglesidebar() {
            const wrapper = document.querySelector(".wrapper");   
            if (wrapper) {
                wrapper.classList.toggle("sidebar_open");
            } else {
                console.error("Error: Could not find the .wrapper element");
            }
            }
    </script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper sidebar_open">
        <div class="main">
            <h1>EITB2</h1>
            <p>ahhhhhh</p>
        </div>
    <!-- Search bar -->
        <form action="/" method="POST">
            <div class="search_box">
                <div class="row">
                    <input type="text" name="wiki_page" id="input_box" placeholder="Search Wikipedia...">
                    <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>


                <div class="suggestions">
                    <ul>
                        <li>suggestion 1</li>
                    </ul>
                </div>
            </div>
        </form>

        <!-- Sidebar toggle button -->
        <button class="sidebar_toggle" type="button" onclick="togglesidebar()">
            <span class="material-icons sb-icon-open">keyboard_double_arrow_left</span>
            <span class="material-icons sb-icon-close">keyboard_double_arrow_right</span>
        </button>
        
        <!-- Sidebar -->
        <div class="sidebar">
            What is this?
        </div>
    </div>

</body>
</html>
