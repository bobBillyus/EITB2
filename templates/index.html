<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EITB2</title>

    <script src="https://kit.fontawesome.com/4089449204.js" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputBox = document.getElementById('input_box');
            const suggestionBox = document.querySelector('.suggestions');
            
            // 1. Setup a controller to cancel pending requests
            let abortController = null;

            // 2. Debounce function: waits for the user to stop typing
            function debounce(func, delay) {
                let timeout;
                return function(...args) {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), delay);
                };
            }

            // 3. The actual search logic
            const performSearch = async () => {
                let query = inputBox.value.trim();

                // Cancel any existing request that hasn't finished yet
                if (abortController) {
                    abortController.abort();
                }

                if (query.length > 2) {
                    // Create a new controller for this specific request
                    abortController = new AbortController();
                    
                    try {
                        const response = await fetch('/live-search', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ query: query }),
                            signal: abortController.signal // Link the abort signal
                        });

                        const results = await response.json();
                        displayResults(results);
                    } catch (error) {
                        if (error.name === 'AbortError') {
                            // This is a "clean" exit because we cancelled the request
                            console.log('Fetch aborted: newer search started.');
                        } else {
                            console.error('Search error:', error);
                        }
                    }
                } else {
                    suggestionBox.innerHTML = "Suggestions will appear here";
                }
            };

            // Attach the debounced function (300ms is the sweet spot for responsiveness)
            inputBox.onkeyup = debounce(performSearch, 300);

            function displayResults(results) {
                if (!results || !results.length) {
                    suggestionBox.innerHTML = "<ul><li>No results found</li></ul>";
                    return;
                }

                const htmlRows = results.map((item) => {
                    return `<li><a href="/graph/?page=${encodeURIComponent(item)}">${item}</a></li>`;
                });
                suggestionBox.innerHTML = `<ul>${htmlRows.join('')}</ul>`;
            }
        });
    </script>

            function togglesidebar() {
                const wrapper = document.querySelector(".wrapper");   
                if (wrapper) {
                    wrapper.classList.toggle("sidebar_open");
                } else {
                    console.error("Error: Could not find the .wrapper element");
                }
                }
        </script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cascadia-mono/index.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper sidebar_open">
        <div class="main">
            <h1>EITB2</h1>
            <p>ahhhhhh</p>
        </div>
    <!-- Search bar -->
        <form action="/" method="POST">
            <div class="search_box">
                <div class="row">
                    <input type="text" name="wiki_page" id="input_box" placeholder="Search Wikipedia...">
                    <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
    <!-- Suggestions -->
                <div class="suggestions">
                    Suggestions will appear here
                </div>
            </div>
        </form>

        <!-- Sidebar toggle button -->
        <button class="sidebar_toggle" type="button" onclick="togglesidebar()">
            <span class="material-icons sb-icon-open">keyboard_double_arrow_left</span>
            <span class="material-icons sb-icon-close">keyboard_double_arrow_right</span>
        </button>
        
        <!-- Sidebar -->
        <div class="sidebar">
            What is this?
        </div>
    </div>

</body>
</html>
