<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EITB2</title>

    <script>
        function sendAction() {
            fetch("/do_action", {
                method: "POST"
            })
            .then(response => response.json())
            .then(document.querySelector(".wrapper").classList.toggle("sidebar_open"))
            .catch(error => {
                console.error("Error:", error)
            })
        }
    </script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="wrapper sidebar_open">
        <div class="main">
            <h1>EITB2</h1>
            <p>ahhhhhh</p>
            <form action="{{ url_for('home') }}" method="post">
                <label for="page_query">Enter any Wikipedia page:</label>
                <input 
                    type="text" 
                    id="page_query" 
                    name="wiki_page" 
                    placeholder="Search Wikipedia..." 
                    required
                >
                <button type="submit">Search</button>
            </form>
        </div>
        <button class="sidebar_toggle" type="button" onclick="sendAction()">
            <span class="material-icons sb-icon-open">keyboard_double_arrow_left</span>
            <span class="material-icons sb-icon-close">keyboard_double_arrow_right</span>
        </button>

        <div class="sidebar">
            Sidebar content
        </div>
    </div>

</body>
</html>
